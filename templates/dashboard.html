<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Caller Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e2e8f0; }
  header { padding: 20px 32px; border-bottom: 1px solid #1e1e2e; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; }
  .badge { background: #1e1e2e; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #64748b; }
  main { padding: 24px 32px; max-width: 1100px; }
  .sessions { display: grid; gap: 12px; margin-bottom: 32px; }
  .session-card { background: #16161f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 18px 20px; cursor: pointer; transition: border-color .15s; }
  .session-card:hover, .session-card.active { border-color: #6366f1; }
  .session-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .session-meta strong { font-size: 15px; }
  .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .tag-pending   { background: #1e293b; color: #64748b; }
  .tag-researching { background: #1e3a5f; color: #60a5fa; }
  .tag-calling   { background: #2d1f5e; color: #a78bfa; }
  .tag-done      { background: #14532d; color: #4ade80; }
  .tag-error     { background: #450a0a; color: #f87171; }
  .tag-completed { background: #14532d; color: #4ade80; }
  .tag-failed    { background: #450a0a; color: #f87171; }
  .tag-calling-v { background: #2d1f5e; color: #a78bfa; }
  .detail { background: #16161f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 24px; }
  .detail h2 { font-size: 16px; margin-bottom: 20px; color: #94a3b8; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 14px; background: #0f0f13; color: #475569; font-weight: 500; border-bottom: 1px solid #1e1e2e; }
  td { padding: 12px 14px; border-bottom: 1px solid #1e1e2e; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .empty { color: #475569; font-size: 13px; padding: 40px 0; text-align: center; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .refresh-info { font-size: 12px; color: #475569; margin-top: 12px; }
  .nav-link { color: #64748b; text-decoration: none; font-size: 13px; padding: 6px 14px; border-radius: 6px; transition: all .15s; }
  .nav-link:hover, .nav-link.active { background: #1e1e2e; color: #e2e8f0; }
</style>
</head>
<body>
<header>
  <h1>⚡ Dispatch</h1>
  <span class="badge" id="refresh-badge">● Live</span>
  <nav style="margin-left:auto;display:flex;gap:8px;">
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/vendors" class="nav-link">Suppliers</a>
    <a href="/settings" class="nav-link">Settings</a>
    <a href="/faq" class="nav-link">FAQ</a>
  </nav>
</header>
<main>
  <div id="sessions-list" class="sessions"></div>
  <div id="detail-panel"></div>
  <p class="refresh-info">Auto-refreshes every 3 seconds</p>
</main>
<script>
  let activeSessionId = null;
  const pathParts = window.location.pathname.split('/');
  if (pathParts[1] === 'session' && pathParts[2]) activeSessionId = pathParts[2];

  function statusTag(s) {
    const map = { pending:'pending', researching:'researching', calling:'calling', done:'done', error:'error',
                  completed:'completed', failed:'failed' };
    const cls = map[s] || 'pending';
    return `<span class="tag tag-${cls}">${s}</span>`;
  }

  async function loadSessions() {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    const container = document.getElementById('sessions-list');
    if (!sessions.length) { container.innerHTML = '<p class="empty">No sessions yet. Call your inbound number to start.</p>'; return; }
    container.innerHTML = sessions.map(s => `
      <div class="session-card ${s.id === activeSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
        <div class="session-meta">
          <strong>${s.product} &times; ${s.quantity}</strong>
          ${statusTag(s.status)}
          <span style="color:#475569;font-size:13px">${s.user_phone}</span>
          <span style="color:#334155;font-size:12px;margin-left:auto">${new Date(s.created_at*1000).toLocaleString()}</span>
        </div>
      </div>
    `).join('');
    if (!activeSessionId && sessions.length) selectSession(sessions[0].id);
  }

  async function loadDetail(sid) {
    const res = await fetch(`/api/sessions/${sid}`);
    const s = await res.json();
    const panel = document.getElementById('detail-panel');
    const vendors = s.vendors || [];
    panel.innerHTML = `
      <div class="detail">
        <h2>Session: ${s.product} &times; ${s.quantity} &mdash; ${statusTag(s.status)}</h2>
        ${vendors.length ? `
        <table>
          <thead><tr>
            <th>Vendor</th><th>Phone</th><th>Status</th>
            <th>Price Quoted</th><th>Lead Time</th><th>Contact</th><th>Notes</th>
          </tr></thead>
          <tbody>
            ${vendors.map(v => `<tr>
              <td><strong>${v.vendor_name}</strong><br><span style="color:#475569;font-size:12px">${v.vendor_website||''}</span></td>
              <td>${v.vendor_phone||'<span style="color:#475569">—</span>'}</td>
              <td>${statusTag(v.status)}${['pending','calling'].includes(v.status)?'<span class="pulse"> ●</span>':''}</td>
              <td>${v.price_quoted||'<span style="color:#475569">pending</span>'}</td>
              <td>${v.lead_time||'<span style="color:#475569">—</span>'}</td>
              <td>${v.contact_name||'<span style="color:#475569">—</span>'}</td>
              <td style="max-width:200px;font-size:12px;color:#64748b">${v.notes||''}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p class="empty">Researching vendors...</p>'}
      </div>
    `;
  }

  function selectSession(sid) {
    activeSessionId = sid;
    document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.session-card').forEach(c => {
      if (c.getAttribute('onclick').includes(sid)) c.classList.add('active');
    });
    loadDetail(sid);
  }

  async function refresh() {
    await loadSessions();
    if (activeSessionId) await loadDetail(activeSessionId);
  }

  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
